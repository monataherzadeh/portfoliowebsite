<!doctype html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/custom.css" />
    <link rel="stylesheet" href="css/index.css" />
    <link rel="stylesheet" href="css/fonts.css" />
    <link rel="stylesheet" href="css/background.css" />
    <link rel="icon" href="img/blomst1.svg" type="image/svg+xml" />
    <title>Forside</title>
  </head>
  <body>
    <button class="burger-btn" id="burgerBtn" aria-label="Åbn menu">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <nav class="mobile-menu" id="mobileMenu">
      <a href="index.html" data-label="Forside">
        <img src="img/blomst1.svg" alt="Forside" />
      </a>
      <a href="portfolio.html" data-label="Portfolio">
        <img src="img/blomst2.svg" alt="Portfolio" />
      </a>
      <a href="omMig.html" data-label="Om mig">
        <img src="img/blomst3.svg" alt="Om mig" />
      </a>
    </nav>

    <header>
      <nav class="flower-nav">
        <a class="nav-flower" href="index.html" data-label="Forside">
          <img src="img/blomst1.svg" alt="Forside" />
        </a>
        <a class="nav-flower" href="portfolio.html" data-label="Portfolio">
          <img src="img/blomst2.svg" alt="Portfolio" />
        </a>
        <a class="nav-flower" href="omMig.html" data-label="Om mig">
          <img src="img/blomst3.svg" alt="Om mig" />
        </a>
      </nav>
    </header>

    <div class="background-flowers">
      <img src="img/blomst3.svg" alt="" class="flower flower1" />
      <img src="img/blomst2.svg" alt="" class="flower flower2" />
      <img src="img/blomst1.svg" alt="" class="flower flower3" />
    </div>

    <main>
      <h1>Portfolio 2026</h1>
      <h2>af mona taherzadeh</h2>
      <h3>multimediedesignstuderende på EK</h3>
    </main>
    <script>
      const btn = document.getElementById("burgerBtn");
      const menu = document.getElementById("mobileMenu");

      btn.addEventListener("click", () => {
        const isOpen = menu.classList.toggle("open");
        btn.classList.toggle("open", isOpen);
        document.body.style.overflow = isOpen ? "hidden" : "";
      });

      menu.querySelectorAll("a").forEach((link) => {
        link.addEventListener("click", () => {
          menu.classList.remove("open");
          btn.classList.remove("open");
          document.body.style.overflow = "";
        });
      });
    </script>
  </body>
</html>
